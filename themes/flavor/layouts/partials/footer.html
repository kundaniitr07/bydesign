<footer class="site-footer">
  <div class="container">
    <div class="footer-grid">
      <div class="footer-brand">
        <a href="{{ .Site.BaseURL }}" class="logo">KD<span class="logo-dot">.</span></a>
        <p>{{ .Site.Params.tagline }}</p>
      </div>
      <div class="footer-links">
        <h4>Navigate</h4>
        {{ range .Site.Menus.main }}
          <a href="{{ .URL | relURL }}">{{ .Name }}</a>
        {{ end }}
      </div>
      <div class="footer-connect">
        <h4>Connect</h4>
        <a href="mailto:{{ .Site.Params.contact.email }}">Email</a>
        <a href="https://linkedin.com/in/yourprofile" target="_blank">LinkedIn</a>
        <a href="https://github.com/kundaniitr07" target="_blank">GitHub</a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; {{ now.Year }} {{ .Site.Params.author }}. Crafted with intention.</p>
    </div>
  </div>
</footer>
<script src="{{ "js/main.js" | relURL }}"></script>
